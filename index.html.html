<!DOCTYPE html>
<html lang="pt BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
    }

    body {
      min-height: 100vh;
      width: 100%;
      background: #004aad;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
      max-width: 100%;
      text-align: center;
    }

    .page img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .cta {
      display: inline-block;
      margin: 24px auto 48px;
      padding: 14px 28px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.2s ease;
    }

    .cta:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="page">
    <img src="casamento2.png" alt="Imagem do casamento">
  </div>
  <div style="text-align: center; padding: 40px 20px;">
    <a class="cta" href="https://noivos.casar.com/matheus-e-julyana-2027-04-17" target="_blank">Clique aqui</a>
  </div>
</body>
</html>
